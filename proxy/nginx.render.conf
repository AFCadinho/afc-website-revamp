server {
    listen 10000;
    server_name _;

    location / {
        proxy_pass https://new.afcadinho.com;
        proxy_ssl_server_name on;
        proxy_set_header Host new.afcadinho.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass https://api.afcadinho.com;
        proxy_ssl_server_name on;
        proxy_set_header Host api.afcadinho.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
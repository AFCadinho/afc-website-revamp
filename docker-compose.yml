name: afc_website_revamped

services:
  backend:
    build: ./backend
    container_name: afc-backend
    env_file:
      - backend.env
    expose:
      - "5000"

  web:
    build: ./apps/web
    container_name: afc-web
    expose:
      - "80"

  proxy:
  image: nginx:stable-alpine
  container_name: afc-proxy
  ports:
    - "8080:80"
  volumes:
    - ./proxy/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
  depends_on:
    - web
    - backend
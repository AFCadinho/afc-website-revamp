services:
  backend:
    build:
      context: ./backend
    env_file:
      - backend.env
    ports:
      - "5000:5000"

  app:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    env_file:
      - web.env
    ports:
      - "${APP_PORT}:10000"
    depends_on:
      - backend
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro